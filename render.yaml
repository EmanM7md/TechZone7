services:
  # 1. PostgreSQL Database
  - type: pgo
    name: techzone-db
    plan: free

  # 2. NodeJS Backend Service
  - type: web
    name: techzone-backend
    env: node
    plan: free
    repo: https://github.com/EmanM7md/TechZone7
    buildCommand: "cd back-end && npm install"
    startCommand: "cd back-end && node server.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: techzone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://techzone-frontend.onrender.com"

  # 3. React Frontend Static Site
  - type: web
    name: techzone-frontend
    env: static
    plan: free
    repo: https://github.com/EmanM7md/TechZone7
    buildCommand: "cd front-end && npm install && npm run build"
    publishPath: "front-end/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://techzone-backend.onrender.com"
